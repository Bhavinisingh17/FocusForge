<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-black relative overflow-hidden">

    <!-- Background Glow -->
    <div class="absolute -top-40 -left-40 h-96 w-96 rounded-full bg-[#7E5E88]/40 blur-3xl"></div>
    <div class="absolute -bottom-40 -right-40 h-96 w-96 rounded-full bg-[#7E5E88]/30 blur-3xl"></div>

    <!-- Signup Card -->
    <div class="relative w-full max-w-md rounded-3xl border border-[#7E5E88]/30 bg-white/5 p-8 backdrop-blur-xl shadow-2xl">

        <h1 class="text-3xl font-bold text-center text-white">
            Focus<span class="text-[#7e5e88]">Forge</span>
        </h1>

        <p class="mt-2 text-center text-gray-400">
Build your study system, one session at a time     
   </p>

        <form class="mt-8 space-y-5" action="/tasks/signup" method="POST">

            <!-- name -->
            <div class="flex gap-4">

    <!-- First Name -->
    <div class="w-1/2">
        <label class="mb-2 block text-sm font-medium text-gray-300">
            First Name
        </label>

        <input
        name="username"
            type="text"
            placeholder="Bhavini"
            class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 text-white placeholder:text-gray-500 outline-none transition focus:border-[#7E5E88] focus:ring-2 focus:ring-[#7E5E88]/40">
    </div>

    <!-- Last Name -->
    <div class="w-1/2">
        <label class="mb-2 block text-sm font-medium text-gray-300">
            Last Name
        </label>

        <input
            type="text"
            placeholder="Singh"
            class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 text-white placeholder:text-gray-500 outline-none transition focus:border-[#7E5E88] focus:ring-2 focus:ring-[#7E5E88]/40">
    </div>

</div>

            <!-- Email -->
            <div>
                <label class="mb-2 block text-sm font-medium text-gray-300">
                    Email
                </label>

                <input
                    name="email"
                    type="email"
                    placeholder="you@email.com"
                    class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 text-white placeholder:text-gray-500 outline-none transition focus:border-[#7E5E88] focus:ring-2 focus:ring-[#7E5E88]/40">
            </div>

            <!-- Password -->
            <div>
                <label class="mb-2 block text-sm font-medium text-gray-300">
                    Password
                </label>

                <input
                name="password"
                    type="password"
                    placeholder="At least 8 characters"
                    class="w-full rounded-xl border border-zinc-700 bg-zinc-900 px-4 py-3 text-white placeholder:text-gray-500 outline-none transition focus:border-[#7E5E88] focus:ring-2 focus:ring-[#7E5E88]/40">
            </div>



            <!-- Button -->
            <button
                class="w-full rounded-xl bg-gradient-to-r from-[#7E5E88] to-[#A883BA] py-3 font-semibold text-white transition hover:scale-[1.02] hover:shadow-lg hover:shadow-[#7E5E88]/40">
                Create Account
            </button>

            

        </form>

    </div>

</body>
</html>
