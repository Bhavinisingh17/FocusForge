<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>focusForge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class'
}
</script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="
min-h-screen
bg-gray-100
dark:bg-gradient-to-r
dark:from-slate-900
dark:to-[#0d1117]
font-[Poppins]
"> 

<!-- ///navbar---- -->
  <nav class="bg-white h-20 sticky top-0 shadow p-4 z-50 flex items-center justify-between pt-2 dark:bg-[#EDA0BF]">
      <h1 class="font-bold mt-3 mb-6 font-mono text-2xl">focus<span class="italic text-[#7e5e88]">F</span>orge</h1>
      <a href="#">Dashboard</a>
      <a href="#">My Task</a>
      <a href="#">Kanban</a>
      <a href="#">Calendar</a>
      <i class="fa-regular fa-moon text-black text-2xl opacity-70 hover:opacity-100 cursor-pointer transition" id="dark"></i>  
  </nav>

<!-- Main body -->

 <main class="flex-1 flex justify-center items-center mt-12 ">
   <div class="flex flex-col p-9 w-full max-w-4xl pt-2 rounded-xl items-center">
      <h1 class="font-bold text-center mb-6 font-mono text-2xl">Study Tasks</h1>
      <form action="/tasks" method="POST" class="flex gap-2">
        
          <input type="text" 
          placeholder="Enter subject"
          name="task"
          class="flex-1 border border-[#7e5e88] p-2 rounded-full h-12 min-w-0"
          >

           <input type="date" 
          placeholder="Enter subject"
          name="dueDate"
          class="flex-1 border border-[#7e5e88] p-2 rounded-full h-12 min-w-0"
          >
          
         <select name="status" class="px-2 rounded h-12 border border-[#7e5e88]" >
            <option value="" selected disabled>Select Status</option>
            <option value="todo">To Do</option>
            <option value="progress">In Progress</option>
            <option value="completed">Completed</option>
         </select>

          <button class="bg-[#7e5e88] px-8 rounded h-12">
          Add
        </button>
      </form>


      <!-- ///kanban -->

     <div id="kanban" class=" flex ">
          <div id="todo" class="w-72 min-h-[500px] bg-white rounded-xl shadow p-4 ml-3 mt-2">
              <h1 class="font-semibold text-lg border-l-4 border-purple-500  mb-4 bg-purple-200 pt-3 pb-3">
              📝 To Do
             </h1>
        </div>

        <div id="progress" class="w-72 min-h-[500px] bg-white rounded-xl shadow p-4 ml-3 mt-2">
            <h1 class="font-semibold text-lg border-l-4 border-yellow-500 pl-3 mb-4 bg-yellow-200 pt-3 pb-3">
              In progress
            </h1>
        </div>

        <div id="completed" class="w-72 min-h-[500px] bg-white rounded-xl shadow p-4 ml-3 mt-2">
            <h1 class="font-semibold text-lg border-l-4 border-green-500 pl-3 mb-4 bg-green-200 pt-3 pb-3">
              Done
            </h1>
        </div>


      </div>
     

<div id="tasklist" class=""></div>    
 </main>
   

    <script src="https://cdn.lordicon.com/lordicon.js"></script>
     <script src="script.js"></script>
</body>
</html>
