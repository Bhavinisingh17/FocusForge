<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>focusForge</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class'
}
</script>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="
min-h-screen
bg-gray-100
dark:bg-black
font-[Poppins]
"> 

<!-- ///navbar---- -->
  <nav class="bg-white sticky top-0 shadow flex flex-wrap items-center justify-between gap-4 dark:bg-[#20201e] dark:text-[#ECECEC] dark:backdrop:blur-lg">
      <h1 class="font-bold mt-3 mb-6 font-mono text-2xl dark:text-[#ECECEC]">focus<span class="italic text-[#7e5e88]">Forge</span></h1>
      <a href="#" class="dark:opacity-70 hover:opacity-100">Dashboard</a>
      <a href="#" class="dark:opacity-70 hover:opacity-100">My Task</a>
      <a href="#" class="dark:opacity-70 hover:opacity-100">Kanban</a>
      <a href="#" class="dark:opacity-70 hover:opacity-100">Calendar</a>
      <i class="fa-regular fa-moon text-black text-2xl opacity-70 hover:opacity-100 cursor-pointer transition dark:text-[#ECECEC]" id="dark"></i>  
  </nav>

<!-- Main body -->

 <main>


  <!-- count of all task -->

  <div class="flex justify-center w-[95%] gap-6">

    <div id="totalTask" class="dark:bg-white/15  dark:text-[#7e5e88] mt-3 p-4 w-64 max-w-60 rounded-xl " >
      <p>Total Tasks</p>
      <h1>Count</h1>
    </div>


    <div id="todoCount" class="dark:bg-white/15  dark:text-[#7e5e88] p-4 w-64 rounded-xl max-w-60 mt-3 ">
      <p>To Do</p>
      <h1>Count</h1>
    </div>


 <div id="inprogCount" class="dark:bg-white/15  dark:text-[#7e5e88] p-4 w-64 rounded-xl max-w-60  mt-3 ">
      <p>In progress</p>
      <h1>Count</h1>
    </div>


 <div id="completeCount" class="dark:bg-white/15  dark:text-[#7e5e88] p-4 rounded-xl w-64 max-w-60 mt-3 ">
      <p>Done</p>
      <h1>Count</h1>
    </div>

  </div>



  <!-- Task Container -->
   <div class="flex flex-col p-9 w-full max-w-7xl pt-2 rounded-xl items-center mx-auto">
      <form action="/tasks" method="POST" class="flex flex-col md:flex-row gap-4 w-[95%]">
        
       <div class="w-full bg-purple-200 p-6 flex rounded-xl border border-purple-100 shadow-sm gap-4 dark:border-0 dark:bg-white/10 dark">
             
          <input type="text" 
          placeholder="Enter subject"
          name="task"
          class=" flex-1 text-[#7972729d] p-2 rounded-md h-10 min-w-0 dark:bg-[#212121] dark:border dark:border-[#3F3F46] dark:text-[#ececec9d]"
          >

           <input type="date" 
          name="dueDate"
          class="text-[#7972729d] flex-1 border p-2 rounded-md h-10 min-w-0 dark:bg-[#212121] dark:border dark:border-[#3F3F46] dark:text-[#ececec9d]  dark:[&::-webkit-calendar-picker-indicator]:opacity-60
    dark:[&::-webkit-calendar-picker-indicator]:invert"
          >
          
         <select name="status" class="text-[#7972729d] flex-1 px-2 rounded-md h-10  dark:bg-[#212121] dark:border dark:border-[#3F3F46]  dark:text-[#ececec9d]" >
            <option value="" selected disabled class="bg-[#7e5e88]">Select Status</option>
            <option value="todo" class="bg-[#7e5e88]">To Do</option>
            <option value="progress">In Progress</option>
            <option value="completed">Completed</option>
         </select>

       <button class="bg-[#7e5e88] px-8  rounded h-10 md:w-auto">       
            Add
       </button>

       </div>
      </form>


      <!-- ///kanban -->

     <div id="kanban" class=" flex w-[95%] overflow-x-auto gap-4">
          <div  class="flex-1  min-w-[280px]  min-h-fit bg-white rounded-xl shadow p-4 ml-3 mt-2 mb-2 dark:bg-[#212121] dark:shadow">
              <h1 class="font-semibold text-lg border-l-4 border-purple-500  mb-4 bg-purple-200 pt-3 pb-3">
              📝 To Do
             </h1>
             <div id = "todo"></div>
        </div>

        <div  class="flex-1  min-w-[280px] min-h-[500px] bg-white rounded-xl shadow p-4 ml-3 mt-2 mb-2 dark: dark:bg-[#212121] dark:shadow">
            <h1 class="font-semibold text-lg border-l-4 border-yellow-500 pl-3 mb-4 bg-yellow-200 pt-3 pb-3">
              In progress
            </h1>
           <div id = "progress"></div>
        </div>

        <div  class="flex-1 min-w-[280px]  min-h-[500px] bg-white rounded-xl shadow p-4 ml-3 mt-2 mb-2 dark: dark:bg-[#212121] dark:shadow">
            <h1 class="font-semibold text-lg border-l-4 border-green-500 pl-3 mb-4 bg-green-200 pt-3 pb-3">
              Done
            </h1>
            <div id="completed"></div>
        </div>
      </div>
 </main>
   

    <script src="https://cdn.lordicon.com/lordicon.js"></script>
     <script src="script.js"></script>
</body>
</html>
