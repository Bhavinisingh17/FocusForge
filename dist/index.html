<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>focusForge</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Libre+Franklin:ital,wght@0,100..900;1,100..900&family=Manrope:wght@200..800&display=swap" rel="stylesheet">
<link href="output.css" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: 'class'
}
</script>
<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="
min-h-screen
bg-gradient-to-r
from-blue-500
to-slate-600

dark:bg-gradient-to-r
dark:from-slate-900
dark:to-[#0d1117]
">  <!-- ///navbar---- -->
  <nav class="bg-slate-300 h-20 sticky top-0 shadow p-4 z-50 flex items-center justify-between pt-2 dark:bg-[#49576b]">
      <h1 class="font-bold  mb-6 font-mono text-2xl">focus<span class="italic text-blue-400">F</span>orge</h1>
      <i class="fa-regular fa-moon text-black text-2xl opacity-70 hover:opacity-100 cursor-pointer transition" id="dark"></i>  
  </nav>

<!-- Main body -->

 <main class="flex-1 flex justify-center items-center mt-12">
   <div class="bg-slate-300 p-9 w-[500px] pt-2 rounded-xl dark:bg-[#49576b] dark:opacity-55
">
      <h1 class="font-bold ml-32 mb-6 font-mono text-2xl">Taskbar</h1>
      <form action="/tasks" method="POST" class="flex gap-2">
        
          <input type="text" 
          placeholder="Enter subject"
          name="task"
          class="flex-1 border border-blue-400 p-2 rounded-full h-12 min-w-0"
          >
          
          <button class="bg-blue-500 px-8 rounded-full h-12">
          Add
        </button>
      </form>
        <div id="tasklist" class="flex flex-col gap-2 mt-4"></div>
    </div>
 </main>
   

    <script src="https://cdn.lordicon.com/lordicon.js"></script>
     <script src="script.js"></script>
</body>
</html>
